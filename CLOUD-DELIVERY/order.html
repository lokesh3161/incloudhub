<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cloud Deliver – Order Now</title>
<style>
html, body { height:100%; margin:0; padding:0; background:#009688 !important; }
body::before { content:""; position:fixed; inset:0; background:#009688; z-index:-1; }
.order-box { max-width:430px; background:white; padding:25px; margin:40px auto; border-radius:15px; box-shadow:0 4px 10px rgba(0,0,0,0.2); }
h2 { text-align:center; color:#00675b; margin-bottom:20px; }
input, textarea { width:100%; padding:12px; margin:8px 0; font-size:16px; border-radius:8px; border:1px solid #ccc; box-sizing:border-box; }
#item-name { background:#e9e9e9; font-weight:bold; }
button { background:#009688; color:white; padding:14px; border:none; width:100%; border-radius:10px; font-size:17px; cursor:pointer; font-weight:bold; }
button:hover { background:#00796b; }
footer { text-align:center; color:white; margin-top:20px; }
</style>
</head>
<body>
<div class="order-box">
<h2>Place Your Order</h2>

<label><b>Your Name</b></label>
<input type="text" id="name" placeholder="Enter your name">

<label><b>Your Phone Number</b></label>
<input type="text" id="number" placeholder="Enter your number">

<label><b>Items</b></label>
<input type="text" id="item-name" readonly>

<label><b>Quantity</b></label>
<input type="number" id="qty" min="1" value="1">

<label><b>Room / Block</b></label>
<input type="text" id="room" placeholder="Ex: CSE Block 207">

<label><b>Notes (Optional)</b></label>
<textarea id="notes" placeholder="Anything special?/Apply coupon code here"></textarea>

<button onclick="placeOrder()">Place Order</button>
</div>
<footer>Designed by Lokesh Thanala © 2025</footer>

<script>
window.onload = function() {
    const params = new URLSearchParams(window.location.search);
    document.getElementById("item-name").value = params.get("items") || params.get("item") || "";
}

function placeOrder() {
    let name = document.getElementById("name").value;
    let number = document.getElementById("number").value;
    let item = document.getElementById("item-name").value;
    let qty = document.getElementById("qty").value;
    let room = document.getElementById("room").value;
    let notes = document.getElementById("notes").value;

    if (name === "" || number === "" || room === "") {
        alert("Please fill all required fields!");
        return;
    }

    let message =
        "📦 *New Cloud Deliver Order* %0A%0A" +
        "👤 *Name:* " + name + "%0A" +
        "📞 *Phone:* " + number + "%0A" +
        "🛒 *Items:* " + item + "%0A" +
        "🔢 *Quantity:* " + qty + "%0A" +
        "🏠 *Room/Block:* " + room + "%0A" +
        "📝 *Notes:* " + notes + "%0A%0A" +
        "⚡ Delivered inside campus by Cloud Deliver";

    let phone = "919100280705";
    window.open("https://wa.me/" + phone + "?text=" + message, "_blank");
}
</script>
</body>
</html>
