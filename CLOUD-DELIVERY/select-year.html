<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Select Year - InCloud</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
#header-wrapper, .header-outer, .footer-outer, .tabs-outer, .sidebar-wrapper, .post-footer, #blog-pager, .comments, .main-inner, .column-right-outer, .column-left-outer {display: none !important;}
body, html {margin: 0 !important;padding: 0 !important;background: #121212 !important;overflow: hidden !important;width: 100%;height: 100%;}
#silk-canvas {position: fixed;top: 0;left: 0;width: 100vw;height: 100vh;z-index: 1;}
#incloud-notes-portal {position: fixed;top: 0;left: 0;width: 100vw;height: 100vh;overflow-y: auto;background: transparent;z-index: 9999;font-family: 'Poppins', sans-serif;color: #ffffff;display: flex;flex-direction: column;align-items: center;padding: 4rem 1rem;box-sizing: border-box;}
#incloud-notes-portal::-webkit-scrollbar { width: 6px; }
#incloud-notes-portal::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
#incloud-notes-portal::-webkit-scrollbar-thumb { background: #F78C25; border-radius: 10px; }
.logo {font-size: clamp(2.5rem, 8vw, 3.8rem);font-weight: 700;color: #F78C25;text-align: center;margin-bottom: 0.5rem;text-shadow: 0 0 20px rgba(247, 140, 37, 0.3);animation: glow 2s ease-in-out infinite alternate;}
@keyframes glow {from { text-shadow: 0 0 20px rgba(247, 140, 37, 0.3); }to { text-shadow: 0 0 40px rgba(247, 140, 37, 0.6); }}
.tagline {font-size: 1.1rem;font-weight: 300;text-align: center;margin-bottom: 3rem;color: #aaaaaa;}
.notes-container {background: rgba(0, 0, 0, 0.4);backdrop-filter: blur(15px);-webkit-backdrop-filter: blur(15px);border-radius: 24px;padding: 2.5rem;box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);width: 100%;max-width: 800px;border: 1px solid rgba(255, 255, 255, 0.1);text-align: center;}
.notes-container h2 {color: #ffffff;font-weight: 600;margin-bottom: 2rem;font-size: 1.8rem;letter-spacing: 1px;}
ul { list-style: none; padding: 0; margin: 0; }
li { margin-bottom: 15px; }
a.note-link {display: block;background: rgba(40, 40, 40, 0.8);padding: 18px 25px;border-radius: 16px;color: #F78C25;text-decoration: none;font-weight: 600;border: 1px solid rgba(247, 140, 37, 0.15);transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);}
a.note-link:hover {background: #F78C25;color: #ffffff;transform: translateY(-4px);box-shadow: 0 10px 25px rgba(247, 140, 37, 0.4);border-color: #F78C25;}
.incloud-footer {margin-top: auto;padding: 2rem 1rem;text-align: center;font-size: 0.85rem;color: #bbbbbb;}
.incloud-footer b { color: #F78C25; }
@media (max-width: 600px) {.notes-container { padding: 1.5rem; }.logo { font-size: 2.5rem; }a.note-link { padding: 15px 20px; }}
</style>
</head>
<body>
<canvas id="silk-canvas"></canvas>
<div id="incloud-notes-portal">
    <div class="logo">InCloud</div>
    <div class="tagline">Your Central Hub for Resources ☁️</div>
    <div class="notes-container">
        <h2>📘 Select the Year</h2>
        <ul>
            <li><a class="note-link" href="first-year.html">1st Year Resources</a></li>
            <li><a class="note-link" href="https://incloudhub.blogspot.com/p/incloud-cse-notes-portal-import.html" target="_blank">2nd Year Resources</a></li>
            <li><a class="note-link" href="https://incloudhub.blogspot.com/p/incloud-cse-notes-portal-import.html" target="_blank">3rd Year Resources</a></li>
            <li><a class="note-link" href="https://incloudhub.blogspot.com/p/incloud-cse-notes-portal-import.html" target="_blank">4th Year Resources</a></li>
        </ul>
    </div>
    <div class="incloud-footer">© 2026 <b>InCloud</b> | Designed by Lokesh Thanala 🚀</div>
</div>
<script>
const vertexShader = `varying vec2 vUv;void main() {vUv = uv;gl_Position = vec4(position, 1.0);}`;
const fragmentShader = `varying vec2 vUv;uniform float uTime;uniform vec3 uColor;uniform float uSpeed;uniform float uScale;uniform float uRotation;uniform float uNoiseIntensity;const float e = 2.71828182845904523536;float noise(vec2 texCoord) {float G = e;vec2 r = (G * sin(G * texCoord));return fract(r.x * r.y * (1.0 + texCoord.x));}vec2 rotateUvs(vec2 uv, float angle) {float c = cos(angle);float s = sin(angle);mat2 rot = mat2(c, -s, s, c);return rot * uv;}void main() {float rnd = noise(gl_FragCoord.xy);vec2 uv = rotateUvs(vUv * uScale, uRotation);vec2 tex = uv * uScale;float tOffset = uSpeed * uTime;tex.y += 0.03 * sin(8.0 * tex.x - tOffset);float pattern = 0.6 + 0.4 * sin(5.0 * (tex.x + tex.y + cos(3.0 * tex.x + 5.0 * tex.y) + 0.02 * tOffset) + sin(20.0 * (tex.x + tex.y - 0.1 * tOffset)));vec4 col = vec4(uColor, 1.0) * vec4(pattern) - rnd / 15.0 * uNoiseIntensity;col.a = 1.0;gl_FragColor = col;}`;
const canvas = document.getElementById('silk-canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
const scene = new THREE.Scene();
const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
function hexToRGB(hex) {hex = hex.replace('#', '');return new THREE.Color(parseInt(hex.slice(0, 2), 16) / 255,parseInt(hex.slice(2, 4), 16) / 255,parseInt(hex.slice(4, 6), 16) / 255);}
const uniforms = {uTime: { value: 0 },uColor: { value: hexToRGB('#7B7481') },uSpeed: { value: 5.0 },uScale: { value: 1.0 },uRotation: { value: 0.0 },uNoiseIntensity: { value: 1.5 }};
const geometry = new THREE.PlaneGeometry(2, 2);
const material = new THREE.ShaderMaterial({uniforms,vertexShader,fragmentShader});
const mesh = new THREE.Mesh(geometry, material);
scene.add(mesh);
function animate(time) {uniforms.uTime.value = time * 0.001;renderer.render(scene, camera);requestAnimationFrame(animate);}
window.addEventListener('resize', () => {renderer.setSize(window.innerWidth, window.innerHeight);});
animate(0);
window.onload = function() {var brs = document.getElementsByTagName('br');for (var i = brs.length - 1; i >= 0; i--) {brs[i].parentNode.removeChild(brs[i]);}};
</script>
</body>
</html>
