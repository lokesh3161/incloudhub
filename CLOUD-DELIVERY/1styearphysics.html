<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1st Year Physics - InCloud</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        #header-wrapper, .header-outer, .footer-outer, .tabs-outer,
        .sidebar-wrapper, .post-footer, #blog-pager, .comments,
        .main-inner, .column-right-outer, .column-left-outer {
            display: none !important;
        }

        body {
            margin: 0 !important;
            padding: 0 !important;
            background: #121212 !important;
            overflow: hidden !important;
        }

        #incloud-physics-portal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            overflow-y: auto;
            background: linear-gradient(135deg, #1f1f1f 0%, #121212 100%);
            z-index: 999999;
            font-family: 'Poppins', sans-serif;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 3rem 1rem;
            box-sizing: border-box;
        }

        #incloud-physics-portal::-webkit-scrollbar { width: 6px; }
        #incloud-physics-portal::-webkit-scrollbar-track { background: #1a1a1a; }
        #incloud-physics-portal::-webkit-scrollbar-thumb { background: #F78C25; border-radius: 10px; }

        .logo {
            font-size: clamp(2.2rem, 8vw, 3.5rem);
            font-weight: 700;
            color: #F78C25;
            text-align: center;
            margin-bottom: 0.5rem;
            text-shadow: 0 0 20px rgba(247, 140, 37, 0.3);
        }

        .tagline {
            font-size: 1.1rem;
            font-weight: 300;
            text-align: center;
            margin-bottom: 2.5rem;
            color: #aaaaaa;
        }

        .resources-container {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 24px;
            padding: 2rem;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 850px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .resources-container h2 {
            color: #ffffff;
            font-weight: 600;
            margin-bottom: 1.5rem;
            font-size: 1.6rem;
            text-align: center;
            letter-spacing: 1px;
        }

        ul {
            list-style: none;
            padding: 0;
            margin: 0;
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        @media (min-width: 700px) {
            ul { grid-template-columns: 1fr 1fr; }
        }

        a.resource-link {
            display: flex;
            align-items: center;
            background: rgba(45, 45, 45, 0.7);
            padding: 16px 20px;
            border-radius: 14px;
            color: #F78C25;
            text-decoration: none;
            font-weight: 600;
            border: 1px solid rgba(247, 140, 37, 0.1);
            transition: all 0.3s ease;
        }

        a.resource-link:hover {
            background: #F78C25;
            color: #ffffff;
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(247, 140, 37, 0.3);
            border-color: #F78C25;
        }

        .icon { margin-right: 12px; font-size: 1.2rem; }

        .incloud-footer {
            margin-top: auto;
            padding: 2.5rem 1rem;
            text-align: center;
            font-size: 0.85rem;
            color: #666666;
        }

        .incloud-footer b { color: #F78C25; }

        @media (max-width: 480px) {
            .resources-container { padding: 1.2rem; }
            .logo { font-size: 2.2rem; }
        }
    </style>
</head>
<body>

<div id="incloud-physics-portal">

    <div class="logo">InCloud</div>
    <div class="tagline">Your Central Hub for Resources ☁️</div>

    <div class="resources-container">
        <h2>📘 Choose the File</h2>
        <ul>
            <li><a class="resource-link" href="https://acrobat.adobe.com/id/urn:aaid:sc:AP:159c24d1-e32d-4ed1-bede-ab0cd6905d24" target="_blank"><span class="icon">📄</span> Interference Notes</a></li>
            <li><a class="resource-link" href="https://acrobat.adobe.com/id/urn:aaid:sc:AP:892ec77a-dba3-44a5-bc2e-0d16b2fa3fd6" target="_blank"><span class="icon">📝</span> Interference QB</a></li>
            <li><a class="resource-link" href="https://acrobat.adobe.com/id/urn:aaid:sc:AP:8ff0f494-2a33-4b23-b21e-ad2a90f32112" target="_blank"><span class="icon">📄</span> Crystallography Notes</a></li>
            <li><a class="resource-link" href="https://acrobat.adobe.com/id/urn:aaid:sc:AP:22a3272f-fa9b-45bb-a21f-12d10f399e45" target="_blank"><span class="icon">📝</span> Crystallography QB</a></li>
            <li><a class="resource-link" href="https://acrobat.adobe.com/id/urn:aaid:sc:AP:373059ba-fd1e-4c3d-90f6-549a21a49dbb" target="_blank"><span class="icon">⭐</span> Unit-1 IMP Questions</a></li>
            <li><a class="resource-link" href="https://acrobat.adobe.com/id/urn:aaid:sc:AP:10c7add5-1740-4d90-9e84-5d7f9ffbbf3d" target="_blank"><span class="icon">⭐</span> Unit-2 IMP Questions</a></li>
            <li><a class="resource-link" href="https://acrobat.adobe.com/id/urn:aaid:sc:AP:b7ec9b95-a037-49f5-82ed-5aee562813f8" target="_blank"><span class="icon">⭐</span> Unit-3 IMP Questions</a></li>
        </ul>
    </div>

    <div class="incloud-footer">
        © 2026 <b>InCloud</b> | Designed by Lokesh Thanala 🚀
    </div>

</div>

<script>
window.onload = function() {
    var brs = document.getElementsByTagName('br');
    for (var i = brs.length - 1; i >= 0; i--) { brs[i].parentNode.removeChild(brs[i]); }
    loadDynamicNotes('1styearphysics');
};
function loadDynamicNotes(subject) {
    const notes = JSON.parse(localStorage.getItem('incloud_notes') || '[]');
    const filtered = notes.filter(n => n.subject === subject);
    if (filtered.length === 0) return;
    const ul = document.querySelector('ul');
    filtered.forEach(n => {
        const li = document.createElement('li');
        li.innerHTML = `<a class="resource-link" href="${n.link}" target="_blank"><span class="icon">${n.icon || '📄'}</span> ${n.title}${n.unit ? ' – ' + n.unit : ''}</a>`;
        ul.appendChild(li);
    });
}
</script>

</body>
</html>
